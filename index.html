<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Watch Collection Page</title>
  </head>
  <body>
   <div class="mx-auto px-6 py-10 min-h-screen">
  
  <section class="mb-8 bg-[#efefef] rounded-lg shadow-sm py-10">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-gray-900">Explore Our Watch Collection</h1>
      <p class="text-gray-600 mt-2">Find the perfect watch by searching below</p>
    </div>

    <div class="flex justify-center">
      <input
        type="text"
        id="search"
        placeholder="Search watches..."
        class="w-full max-w-lg border border-gray-300 rounded-xl p-3 shadow-sm transition duration-200"
        onkeyup="filterEmployee()"
      />
    </div>
  </section>

  <div
    id="notFound"
    class="hidden text-center text-red-600 font-semibold text-lg bg-red-50 py-3 rounded-lg shadow-sm mb-6"
  >
    No watches found.
  </div>

  <div
    id="watchproduct"
    class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"
  ></div>
</div>


    <script src="watch-product.js"></script>
  </body>
</html>
